apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: comic-comps-backend
spec:
  template:
    spec:
      containers:
        - image: gcr.io/PROJECT_ID/comic-comps-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: ENVIRONMENT
              value: production
            - name: CORS_ORIGINS
              value: https://YOUR_FRONTEND_DOMAIN

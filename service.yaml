apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: comic-comps-backend
spec:
  template:
    spec:
      containers:
        - image: gcr.io/PROJECT_ID/comic-comps-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: ENVIRONMENT
              value: production
            - name: CORS_ORIGINS
              value: https://jolly-longma-5797b4.netlify.app
            - name: COMPS_PROVIDER
              value: apify
            - name: APIFY_ACTOR_ID
              value: caffein.dev~ebay-sold-listings
            - name: APIFY_EBAY_SITE
              value: ebay.com
            - name: APIFY_DAYS_TO_SCRAPE
              value: "90"
            - name: APIFY_MAX_TOTAL_CHARGE_USD
              value: "1"
            - name: APIFY_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: apify-api-token
                  key: latest

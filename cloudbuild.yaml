substitutions:
  _SERVICE_NAME: comic-comps-backend
  _REGION: us-central1
  _IMAGE_TAG: latest
  _CORS_ORIGINS: https://jolly-longma-5797b4.netlify.app
  _COMPS_PROVIDER: apify
  _APIFY_ACTOR_ID: caffein.dev~ebay-sold-listings
  _APIFY_EBAY_SITE: ebay.com
  _APIFY_DAYS_TO_SCRAPE: "90"
  _APIFY_MAX_TOTAL_CHARGE_USD: "1"
  _APIFY_TOKEN_SECRET: apify-api-token:latest

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${_IMAGE_TAG}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${_IMAGE_TAG}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${_IMAGE_TAG}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --set-env-vars
      - CORS_ORIGINS=${_CORS_ORIGINS},COMPS_PROVIDER=${_COMPS_PROVIDER},APIFY_ACTOR_ID=${_APIFY_ACTOR_ID},APIFY_EBAY_SITE=${_APIFY_EBAY_SITE},APIFY_DAYS_TO_SCRAPE=${_APIFY_DAYS_TO_SCRAPE},APIFY_MAX_TOTAL_CHARGE_USD=${_APIFY_MAX_TOTAL_CHARGE_USD}
      - --set-secrets
      - APIFY_API_TOKEN=${_APIFY_TOKEN_SECRET}

images:
  - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${_IMAGE_TAG}
